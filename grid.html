      <div class="white"></div>
      <div class="black"></div>
      <div class="white"></div>
      <div class="black"></div>

      <!-- Row 3. Has 7 divs. -->
      <div class="white"></div>

      <div class="black"></div>

      <div class="black"></div>

      <div class="black"></div>
      <div class="white"></div>
      <div class="black"></div>
      <div class="white"></div>
      <div class="black"></div>

      <!-- Row 6. Has 7 divs. -->

      <div class="black"></div>
      <div class="white"></div>
      <div class="black"></div>
      <div class="white"></div>
      <div class="black"></div>
      <div class="white"></div>

      <!-- Row 7. Has 4 divs. -->
      <div class="white"></div>
      <div class="green-square"></div>
      <div class="red-rectangle"></div>
      <div class="black"></div>

      <!-- Row 8 (bottom). Has 8 divs. -->
      <div class="black"></div>
      <div class="white"></div>
      <div class="black"></div>
      <div class="white"></div>
      <div class="black"></div>
      <div class="white"></div>
